<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F2FE;stop-opacity:1" />
    </linearGradient>
    <filter id="noise">
      <feTurbulence baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0 0.1"/>
      </feComponentTransfer>
    </filter>
    <pattern id="dashedGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 0 25 L 50 25 M 25 0 L 25 50" fill="none" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="5,5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad)"/>
  <!-- Subtle dashed grid -->
  <rect width="100%" height="100%" fill="url(#dashedGrid)"/>
  <!-- Pastel organic blobs -->
  <ellipse cx="1200" cy="400" rx="200" ry="150" fill="#a7f3d0" opacity="0.2" filter="blur(20px)"/>
  <ellipse cx="1400" cy="700" rx="150" ry="100" fill="#bfdbfe" opacity="0.2" filter="blur(15px)"/>
  <!-- Soft bokeh particles -->
  <circle cx="300" cy="200" r="5" fill="#6ee7b7" opacity="0.3"/>
  <circle cx="500" cy="300" r="3" fill="#3b82f6" opacity="0.2"/>
  <circle cx="700" cy="500" r="4" fill="#0ea5a4" opacity="0.25"/>
  <circle cx="900" cy="600" r="6" fill="#6ee7b7" opacity="0.2"/>
  <!-- Noise texture -->
  <rect width="100%" height="100%" filter="url(#noise)" opacity="0.03"/>
</svg>