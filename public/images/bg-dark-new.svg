<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5A4;stop-opacity:1" />
    </linearGradient>
    <filter id="noise">
      <feTurbulence baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0 0.1"/>
      </feComponentTransfer>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad)"/>
  <!-- Faint geometric grid -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <!-- Soft organic blobs -->
  <ellipse cx="1200" cy="400" rx="200" ry="150" fill="#6EE7B7" opacity="0.1" filter="blur(20px)"/>
  <ellipse cx="1400" cy="700" rx="150" ry="100" fill="#3B82F6" opacity="0.1" filter="blur(15px)"/>
  <!-- Bokeh particles -->
  <circle cx="300" cy="200" r="5" fill="#6EE7B7" opacity="0.3"/>
  <circle cx="500" cy="300" r="3" fill="#3B82F6" opacity="0.2"/>
  <circle cx="700" cy="500" r="4" fill="#0EA5A4" opacity="0.25"/>
  <circle cx="900" cy="600" r="6" fill="#6EE7B7" opacity="0.2"/>
  <!-- Noise texture -->
  <rect width="100%" height="100%" filter="url(#noise)" opacity="0.05"/>
  <!-- Soft inner glow behind headline area (left 40%) -->
  <rect x="0" y="0" width="768" height="1080" fill="#0EA5A4" opacity="0.05" filter="url(#glow)"/>
</svg>